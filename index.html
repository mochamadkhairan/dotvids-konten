<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DotVids - Day 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        /* Custom smooth transition */
        .section-fade {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Efek kedip kursor Typed.js biar estetik */
        .typed-cursor {
            color: #3b82f6;
        }
    </style>
</head>
<body class="bg-[#0d0e12] text-slate-100 font-sans min-h-screen flex items-center justify-center overflow-hidden selection:bg-blue-500 selection:text-white">

    <main class="w-full max-w-md px-6 relative flex flex-col justify-center min-h-[400px]">
        
        <section id="section1" class="section-fade opacity-100 transform translate-y-0 flex flex-col space-y-6">
            <div class="space-y-5">
                <span class="text-sm font-semibold tracking-wider text-blue-400 uppercase bg-blue-500/10 px-3 py-1 rounded-full w-max">
                    Day 1 Muncul di beranda kalian
                </span>
                <h1 class="text-3xl font-bold leading-tight min-h-[80px]">
                    <span id="typed-hook"></span>
                </h1>
            </div>
            
            <button id="btn-next1" class="opacity-0 translate-y-4 transition-all duration-500 bg-white text-slate-900 font-medium px-6 py-3 rounded-xl shadow-lg hover:bg-blue-500 hover:text-white active:scale-95 flex items-center justify-center space-x-2 cursor-pointer w-max">
                <span>kenalan yuk!</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </section>

        <section id="section2" class="section-fade hidden opacity-0 transform translate-y-10 flex flex-col space-y-6 absolute inset-x-6">
            <div class="space-y-3">
                <div>
                    <img src="asets/logo-dotvids.jpeg" alt="Logo DotVids" class="w-30 h-18 rounded-full border-2 border-blue-500 shadow-lg">
                </div>
                <p class="text-lg text-slate-300 leading-relaxed min-h-[90px]">
                    <span id="typed-intro"></span>
                </p>
            </div>

            <button id="btn-next2" class="opacity-0 translate-y-4 transition-all duration-500 bg-indigo-600 text-white font-medium px-6 py-3 rounded-xl shadow-lg shadow-indigo-600/30 hover:bg-indigo-500 active:scale-95 flex items-center justify-center space-x-2 cursor-pointer w-max">
                <span>Next</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </section>

        <section id="section3" class="section-fade hidden opacity-0 transform translate-y-10 flex flex-col space-y-5 absolute inset-x-6">
            <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 backdrop-blur-sm space-y-4 shadow-xl">
                <div class="flex items-center space-x-2 text-green-400 font-mono text-sm">
                    <span>Help Admin Gais!</span>
                </div>
                
                <p class="text-xl font-medium text-slate-200">
                    <span id="typed-cta"></span>
                </p>
            </div>

            <div class="text-center text-sm text-slate-400 font-medium animate-bounce pt-2">
                Jangan lupa follow akun kita juga ya.. 👇
            </div>

            <div class="grid grid-cols-1 gap-3 pt-2">
                
                <a href="https://tiktok.com/@dotvids" target="_blank" class="flex items-center justify-between bg-slate-900/40 border border-slate-800 hover:border-pink-500/50 rounded-xl p-3.5 transition-all duration-300 hover:scale-[1.02]">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 bg-pink-500/10 rounded-lg text-pink-500">
                            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.02 1.74 4.05 1.08.97 2.53 1.48 3.97 1.56v3.91c-1.4-.02-2.8-.37-4.04-1.04-.61-.34-1.16-.79-1.63-1.3-.04 2.87-.02 5.74-.03 8.61-.02 2.16-.7 4.38-2.27 5.92-1.66 1.7-4.17 2.45-6.47 2.14-2.58-.28-4.99-2.02-5.88-4.51-.99-2.61-.43-5.7 1.47-7.79 1.5-1.7 3.86-2.51 6.1-2.2v4.02c-1.28-.15-2.62.29-3.48 1.28-.79.88-.93 2.22-.44 3.29.46 1.08 1.62 1.8 2.79 1.77 1.4.05 2.66-.99 2.89-2.37.11-.53.07-1.08.07-1.62V.02z"/></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400">TikTok</p>
                            <p class="text-sm font-bold text-slate-200">@dotvids</p>
                        </div>
                    </div>
                    <span class="text-xs bg-slate-800 px-2.5 py-1 rounded-full text-slate-400">Follow</span>
                </a>

                <a href="https://instagram.com/dotvids" target="_blank" class="flex items-center justify-between bg-slate-900/40 border border-slate-800 hover:border-blue-400/50 rounded-xl p-3.5 transition-all duration-300 hover:scale-[1.02]">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 bg-blue-400/10 rounded-lg text-blue-400">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400">Instagram</p>
                            <p class="text-sm font-bold text-slate-200">@dotvids.studio</p>
                        </div>
                    </div>
                    <span class="text-xs bg-slate-800 px-2.5 py-1 rounded-full text-slate-400">Follow</span>
                </a>

                <a href="https://wa.me/628xxxxxxxxxx" target="_blank" class="flex items-center justify-between bg-slate-900/40 border border-slate-800 hover:border-green-500/50 rounded-xl p-3.5 transition-all duration-300 hover:scale-[1.02]">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 bg-green-500/10 rounded-lg text-green-500">
                            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.966 0c3.184.001 6.177 1.242 8.43 3.496 2.253 2.254 3.491 5.249 3.491 8.434 0 6.618-5.337 11.966-11.905 11.966-2.001-.001-3.972-.51-5.729-1.482L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.742.002-2.602-1.01-5.05-2.852-6.894C16.58 2.074 14.135.06 11.533.06c-5.442 0-9.864 4.372-9.869 9.746-.001 1.702.461 3.361 1.338 4.81l-.995 3.633 3.732-.975z"/></svg>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400">WhatsApp Admin</p>
                            <p class="text-sm font-bold text-slate-200">+62 815-6387-4093</p>
                        </div>
                    </div>
                    <span class="text-xs bg-slate-800 px-2.5 py-1 rounded-full text-slate-400">Chat</span>
                </a>

            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // --- ANIMASI SECTION 1 ---
            const typedHook = new Typed('#typed-hook', {
                strings: ['Halo gais! 👋^500 Akhirnya kita berani juga bikin akun ini...'],
                typeSpeed: 40,
                showCursor: true,
                onComplete: function() {
                    // Munculkan tombol setelah ketikan selesai
                    const btn1 = document.getElementById('btn-next1');
                    btn1.classList.remove('opacity-0', 'translate-y-4');
                }
            });

            // --- TRANSISI SECTION 1 KE SECTION 2 ---
            document.getElementById('btn-next1').addEventListener('click', function() {
                const s1 = document.getElementById('section1');
                const s2 = document.getElementById('section2');

                s1.classList.add('opacity-0', '-translate-y-10');
                setTimeout(() => {
                    s1.classList.add('hidden');
                    s2.classList.remove('hidden');
                    // Trigger reflow untuk animasi masuk
                    s2.offsetHeight; 
                    s2.classList.remove('opacity-0', 'translate-y-10');
                    s2.classList.add('opacity-100', 'translate-y-0');

                    // Mulai ngetik Section 2
                    new Typed('#typed-intro', {
                        strings: ['Kenalin, kita ^300<strong class="text-blue-400">DotVids</strong>.<br>Tempatnya kalian yang ingin membuat website premium full custom sesuai keinginan kalian dan juga tempat untuk kalian yang mager ngedit video bisa calling kita aja ya biar kita yang urus. Ini adalah perjalanan awal kita, support kita ya gais! ^500'],
                        typeSpeed: 30,
                        showCursor: true,
                        onComplete: function() {
                            const btn2 = document.getElementById('btn-next2');
                            btn2.classList.remove('opacity-0', 'translate-y-4');
                        }
                    });
                }, 600);
            });

            // --- TRANSISI SECTION 2 KE SECTION 3 ---
            document.getElementById('btn-next2').addEventListener('click', function() {
                const s2 = document.getElementById('section2');
                const s3 = document.getElementById('section3');

                s2.classList.add('opacity-0', '-translate-y-10');
                setTimeout(() => {
                    s2.classList.add('hidden');
                    s3.classList.remove('hidden');
                    s3.offsetHeight;
                    s3.classList.remove('opacity-0', 'translate-y-10');
                    s3.classList.add('opacity-100', 'translate-y-0');

                    // Mulai ngetik Section 3 (CTA)
                    new Typed('#typed-cta', {
                        strings: ['Plis pura-pura komen ya,^400 biar admin gak gabut-gabut amat...'],
                        typeSpeed: 45,
                        showCursor: false
                    });
                }, 600);
            });

        });
    </script>
</body>
</html>
